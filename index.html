<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Pool Simulator</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f4f4f5;
            color: #18181b;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h1, h2 {
            border-bottom: 2px solid #e4e4e7;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .control-group {
            background: #fafafa;
            padding: 20px;
            border-radius: 6px;
            border: 1px solid #e4e4e7;
        }
        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        select, input[type="number"], input[type="text"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #d4d4d8;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input[readonly] {
            background-color: #e4e4e7;
            font-weight: bold;
            color: #2563eb;
            cursor: default;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            font-size: 14px;
        }
        th, td {
            padding: 10px;
            border: 1px solid #e4e4e7;
            text-align: left;
            vertical-align: middle;
        }
        th {
            background: #f4f4f5;
            font-weight: 600;
        }
        .match-select {
            width: 100%;
            padding: 6px;
            border: 1px solid #d4d4d8;
            border-radius: 4px;
            margin: 0;
        }
        .rank-1 { background-color: #fef08a; }
        .rank-2 { background-color: #e2e8f0; }
        .rank-3 { background-color: #fed7aa; }
        
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            background: #f4f4f5;
            color: #52525b;
            display: inline-block;
            border: 1px solid #e4e4e7;
            font-size: 13px;
        }
        .badge-correct {
            background: #dcfce7;
            color: #166534;
            font-weight: bold;
            border: 1px solid #bbf7d0;
        }
        .points-gained {
            color: #16a34a;
            font-weight: 600;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .grid-2 label {
            font-size: 13px;
            margin-bottom: 4px;
            font-weight: normal;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Tournament Pool Simulator</h1>
    
    <div class="controls">
        <div class="control-group">
            <h2>Futures Settings</h2>
            <label>Tournament Winner (30 pts)</label>
            <select id="tournamentWinner" onchange="simulate()">
                <option value="None">None / Undecided</option>
                <option value="Spain">Spain</option>
                <option value="England">England</option>
                <option value="Argentina">Argentina</option>
            </select>

            <label>Calculated Golden Boot Winner (20 pts)</label>
            <input type="text" id="calculatedGbWinner" readonly value="">
        </div>

        <div class="control-group">
            <h2>Player Additional Stats</h2>
            <p style="font-size: 13px; color: #52525b; margin-top: 0; margin-bottom: 15px;">Input <strong>additional</strong> goals (3 pts each) and assists for the remaining matches.</p>
            
            <label>Kylian Mbappe (Base: 8G, 3A)</label>
            <div class="grid-2">
                <div>
                    <label>Goals</label>
                    <input type="number" id="goals_Mbappe" min="0" value="0" oninput="simulate()">
                </div>
                <div>
                    <label>Assists</label>
                    <input type="number" id="assists_Mbappe" min="0" value="0" oninput="simulate()">
                </div>
            </div>
            
            <label>Harry Kane (Base: 6G, 1A)</label>
            <div class="grid-2">
                <div>
                    <label>Goals</label>
                    <input type="number" id="goals_Harry_Kane" min="0" value="0" oninput="simulate()">
                </div>
                <div>
                    <label>Assists</label>
                    <input type="number" id="assists_Harry_Kane" min="0" value="0" oninput="simulate()">
                </div>
            </div>
            
            <label>Mikel Oyarzabal (Base: 5G, 1A)</label>
            <div class="grid-2">
                <div>
                    <label>Goals</label>
                    <input type="number" id="goals_Mikel_Oyarzabal" min="0" value="0" oninput="simulate()">
                </div>
                <div>
                    <label>Assists</label>
                    <input type="number" id="assists_Mikel_Oyarzabal" min="0" value="0" oninput="simulate()">
                </div>
            </div>
        </div>
    </div>

    <h2>Live Dynamic Leaderboard</h2>
    <table id="matchTable">
        <thead>
            <tr>
                <th>Rank</th>
                <th>Player</th>
                <th>Predicted Winner</th>
                <th>Predicted Golden Boot</th>
                <th>Base Pts</th>
                <th>Match Points (3 Games)</th>
                <th>Pts Gained</th>
                <th>Total Pts</th>
            </tr>
        </thead>
        <tbody>
            <!-- Populated by JavaScript -->
        </tbody>
    </table>
</div>

<script>
    // Initial Player Data
    const playersData = [
        { name: "Maor.T", base: 260, winner: "France", gb: "Mbappe" },
        { name: "Edward", base: 246.5, winner: "Spain", gb: "Mbappe" },
        { name: "Eran Ben Elisha", base: 240, winner: "France", gb: "Mbappe" },
        { name: "Yonathan.L", base: 234, winner: "Spain", gb: "Mbappe" },
        { name: "Tariq", base: 232.5, winner: "Brazil", gb: "Harry Kane" },
        { name: "Maor Gottlieb", base: 229, winner: "France", gb: "Erling Haaland" }, 
        { name: "Dror", base: 227, winner: "Portugal", gb: "Harry Kane" },
        { name: "גל פרסמן", base: 214, winner: "Spain", gb: "Mbappe" },
        { name: "Michael Gur", base: 212.5, winner: "Portugal", gb: "Harry Kane" },
        { name: "Arthur", base: 209, winner: "Portugal", gb: "Mikel Oyarzabal" },
        { name: "רן רוזנשטיין", base: 204, winner: "England", gb: "Mikel Oyarzabal" },
        { name: "Ran D", base: 201, winner: "France", gb: "Harry Kane" },
        { name: "Max C", base: 193, winner: "Argentina", gb: "Mbappe" },
        { name: "נמרוד", base: 188.5, winner: "Spain", gb: "Mbappe" },
        { name: "שלמה אסף", base: 181, winner: "France", gb: "Mbappe" },
        { name: "דניאל חיון", base: 175, winner: "France", gb: "Mbappe" }
    ];

    // Maintain state including active selections
    let playerState = playersData.map(p => ({ ...p, matchPts: 0, total: p.base, gained: 0 }));

    // Calculate match points options (a*5 + x*6)
    const matchOptions = [];
    for (let a = 0; a <= 1; a++) {
        for (let x = 0; x <= 5; x++) {
            matchOptions.push(a * 5 + x * 6);
        }
    }
    const uniqueOptions = [...new Set(matchOptions)].sort((c, d) => c - d);

    function updateMatchPts(playerName, value) {
        const player = playerState.find(p => p.name === playerName);
        if (player) {
            player.matchPts = parseInt(value) || 0;
            simulate();
        }
    }

    function calculateGB() {
        let mbappeG = 8 + (parseInt(document.getElementById('goals_Mbappe').value) || 0);
        let mbappeA = 3 + (parseInt(document.getElementById('assists_Mbappe').value) || 0);

        let kaneG = 6 + (parseInt(document.getElementById('goals_Harry_Kane').value) || 0);
        let kaneA = 1 + (parseInt(document.getElementById('assists_Harry_Kane').value) || 0);

        let oyarzabalG = 5 + (parseInt(document.getElementById('goals_Mikel_Oyarzabal').value) || 0);
        let oyarzabalA = 1 + (parseInt(document.getElementById('assists_Mikel_Oyarzabal').value) || 0);

        let candidates = [
            { name: "Mbappe", g: mbappeG, a: mbappeA, min: 564 },
            { name: "Harry Kane", g: kaneG, a: kaneA, min: 489 },
            { name: "Mikel Oyarzabal", g: oyarzabalG, a: oyarzabalA, min: 544 }
        ];

        candidates.sort((p1, p2) => {
            if (p2.g !== p1.g) return p2.g - p1.g;
            if (p2.a !== p1.a) return p2.a - p1.a;
            return p1.min - p2.min; 
        });

        let winnerName = candidates[0].name;
        document.getElementById('calculatedGbWinner').value = `${winnerName} (${candidates[0].g}G, ${candidates[0].a}A)`;
        return winnerName;
    }

    function simulate() {
        const actualWinner = document.getElementById('tournamentWinner').value;
        const actualGbWinner = calculateGB();

        // Calculate points
        playerState.forEach(p => {
            p.total = p.base;
            p.gained = 0;

            if (p.winner === actualWinner) {
                p.total += 30;
                p.gained += 30;
            }

            if (p.gb === actualGbWinner) {
                p.total += 20;
                p.gained += 20;
            }

            if (["Mbappe", "Harry Kane", "Mikel Oyarzabal"].includes(p.gb)) {
                const safeGbId = p.gb.replace(/\s+/g, '_');
                const goalInput = document.getElementById('goals_' + safeGbId);
                if (goalInput) {
                    const addedGoals = parseInt(goalInput.value) || 0;
                    p.total += (addedGoals * 3);
                    p.gained += (addedGoals * 3);
                }
            }

            p.total += p.matchPts;
            p.gained += p.matchPts;
        });

        // Sort by total points descending
        playerState.sort((a, b) => b.total - a.total);

        // Render Table
        const tbody = document.querySelector('#matchTable tbody');
        let html = '';
        
        playerState.forEach((p, index) => {
            const rank = index + 1;
            let rowClass = '';
            if (rank === 1) rowClass = 'rank-1';
            else if (rank === 2) rowClass = 'rank-2';
            else if (rank === 3) rowClass = 'rank-3';

            // Badges
            const winnerBadge = p.winner === actualWinner 
                ? `<span class="badge badge-correct">${p.winner}</span>` 
                : `<span class="badge">${p.winner}</span>`;
                
            const gbBadge = p.gb === actualGbWinner 
                ? `<span class="badge badge-correct">${p.gb}</span>` 
                : `<span class="badge">${p.gb}</span>`;

            // Dropdown Options
            const optionsHtml = uniqueOptions.map(val => {
                const selected = val === p.matchPts ? 'selected' : '';
                return `<option value="${val}" ${selected}>${val} pts</option>`;
            }).join('');
            
            const selectHtml = `<select class="match-select" onchange="updateMatchPts('${p.name}', this.value)">${optionsHtml}</select>`;

            html += `
                <tr class="${rowClass}">
                    <td><strong>${rank}</strong></td>
                    <td><strong>${p.name}</strong></td>
                    <td>${winnerBadge}</td>
                    <td>${gbBadge}</td>
                    <td>${p.base}</td>
                    <td>${selectHtml}</td>
                    <td class="points-gained">+${p.gained}</td>
                    <td><strong>${p.total}</strong></td>
                </tr>
            `;
        });

        tbody.innerHTML = html;
    }

    // Initialize on load
    window.onload = simulate;
</script>

</body>
</html>
